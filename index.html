<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>قيد بلوك 3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap');

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }

  /* ---- Light theme (default) ---- */
  :root {
    --bg: #f0eee9;
    --bg-grad-1: radial-gradient(1200px 800px at 10% -10%, rgba(255,210,170,0.55), transparent 60%),
                 radial-gradient(1000px 800px at 100% 0%, rgba(150,200,255,0.45), transparent 55%),
                 radial-gradient(900px 700px at 50% 110%, rgba(255,200,220,0.45), transparent 60%);
    --surface: rgba(255,255,255,0.62);
    --surface-elev: rgba(255,255,255,0.78);
    --surface-solid: #ffffff;
    --tile-warm: rgba(255,253,246,0.78);
    --ink: #0a0a0a;
    --ink-soft: #2a2a2a;
    --muted: #6e6e72;
    --line: rgba(0,0,0,0.08);
    --line-strong: rgba(0,0,0,0.18);
    --accent-soft: rgba(0,0,0,0.05);
    --gold: #f5b800;
    --positive: #1b8a4b;
    --negative: #c1432f;
    --on-gold: #1a1100;
    --on-negative: #ffffff;
    --on-positive: #ffffff;
    --font-body: 'Geist', system-ui, -apple-system, sans-serif;
    --font-num: 'Geist Mono', monospace;
    --num-weight: 600;
    --radius-s: 10px;
    --radius: 16px;
    --radius-l: 24px;
    /* Glass tokens */
    --glass-blur: blur(28px) saturate(180%);
    --glass-highlight: rgba(255,255,255,0.7);
    --glass-edge: rgba(255,255,255,0.45);
    --shadow-card: 0 0 0 1px var(--line), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-lift: 0 12px 32px -12px rgba(0,0,0,0.18), 0 0 0 1px var(--line);
  }

  /* ---- Dark theme ---- */
  [data-theme="dark"] {
    --bg: #0a0a0c;
    --bg-grad-1: radial-gradient(1200px 800px at 10% -10%, rgba(110,80,40,0.45), transparent 60%),
                 radial-gradient(1000px 800px at 100% 0%, rgba(40,80,140,0.4), transparent 55%),
                 radial-gradient(900px 700px at 50% 110%, rgba(120,40,80,0.4), transparent 60%);
    --surface: rgba(36,36,40,0.55);
    --surface-elev: rgba(48,48,54,0.72);
    --surface-solid: #1c1c1e;
    --tile-warm: rgba(58,52,40,0.6);
    --ink: #f5f5f7;
    --ink-soft: #d6d6d8;
    --muted: #9b9b9f;
    --line: rgba(255,255,255,0.12);
    --line-strong: rgba(255,255,255,0.22);
    --accent-soft: rgba(255,255,255,0.08);
    --gold: #ffd60a;
    --positive: #30d158;
    --negative: #ff453a;
    --on-gold: #1a1100;
    --on-negative: #ffffff;
    --on-positive: #052e15;
    --glass-blur: blur(28px) saturate(160%);
    --glass-highlight: rgba(255,255,255,0.18);
    --glass-edge: rgba(255,255,255,0.08);
    --shadow-card: 0 0 0 1px var(--line);
    --shadow-lift: 0 14px 36px -12px rgba(0,0,0,0.6), 0 0 0 1px var(--line);
  }

  html[lang="ar"] { --font-body: 'IBM Plex Sans Arabic', 'Geist', system-ui, sans-serif; }

  body {
    background: var(--bg-grad-1), var(--bg);
    background-attachment: fixed;
    color: var(--ink);
    font-family: var(--font-body);
    min-height: 100vh;
    padding: 16px;
    line-height: 1.4;
  }
  .container { max-width: 980px; margin: 0 auto; }

  /* Common glass treatment — translucent surface + backdrop blur + soft inner
     highlight on the top edge to suggest glass thickness. Apply by adding the
     .glass class OR by extending via CSS variables on .card / .sheet / etc. */
  .glass, .card, .sheet, .game-card, .play-actions, .winner-stage > .winner-card {
    background: var(--surface);
    -webkit-backdrop-filter: var(--glass-blur);
    backdrop-filter: var(--glass-blur);
  }
  /* Subtle top-edge highlight on glass surfaces */
  .card, .game-card, .sheet, .winner-stage > .winner-card {
    position: relative;
  }
  .card::before,
  .game-card::before,
  .sheet::before {
    content: '';
    position: absolute;
    top: 0; left: 12px; right: 12px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--glass-highlight), transparent);
    pointer-events: none;
    border-radius: 1px;
  }

  /* Numbers — tabular, mono */
  .num {
    font-family: var(--font-num);
    font-variant-numeric: tabular-nums;
    font-weight: var(--num-weight);
    letter-spacing: -0.02em;
  }
  html[dir="rtl"] .num,
  html[dir="rtl"] .pt-score,
  html[dir="rtl"] .team-score,
  html[dir="rtl"] .pt-seat { direction: ltr; unicode-bidi: isolate; }

  /* Header */
  .app-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
    padding: 6px 2px;
  }
  .app-header .title-block { display: flex; flex-direction: column; line-height: 1.1; }
  .app-header .eyebrow {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
    font-weight: 600;
  }
  .app-header h1 {
    margin: 0;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.03em;
    color: var(--ink);
  }
  .header-controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .lang-switch select {
    width: auto;
    padding: 6px 12px;
    font-size: 13px;
    background: var(--surface-elev);
    -webkit-backdrop-filter: var(--glass-blur);
    backdrop-filter: var(--glass-blur);
    border: 1px solid var(--line);
    border-radius: 999px;
    color: var(--ink);
    font-family: inherit;
  }
  .theme-toggle-btn {
    width: 36px; height: 36px;
    border-radius: 999px;
    display: grid; place-items: center;
    background: var(--surface-elev);
    color: var(--ink);
    box-shadow: inset 0 0 0 1px var(--line);
    -webkit-backdrop-filter: var(--glass-blur);
    backdrop-filter: var(--glass-blur);
    padding: 0;
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
  }
  .theme-toggle-btn:hover { background: var(--accent-soft); opacity: 1; }
  .theme-toggle-btn .theme-icon { display: inline-block; }
  [data-theme="dark"] .theme-toggle-btn .theme-icon { transform: rotate(180deg); }

  /* Card surfaces */
  .card {
    background: var(--surface);
    border-radius: var(--radius-l);
    padding: 22px;
    margin-bottom: 14px;
    box-shadow: var(--shadow-card);
  }
  h2 {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 14px;
  }
  label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 8px;
  }

  /* Inputs */
  input[type="text"], input[type="number"], select {
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--ink);
    padding: 11px 14px;
    border-radius: var(--radius);
    font-size: 15px;
    width: 100%;
    font-family: inherit;
    font-weight: 500;
  }
  input:focus, select:focus { outline: none; border-color: var(--ink-soft); }

  /* Buttons */
  button {
    font-family: inherit;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: -0.2px;
    padding: 12px 18px;
    border-radius: var(--radius);
    border: 0;
    cursor: pointer;
    background: var(--ink);
    color: var(--bg);
    transition: transform 80ms ease, opacity 120ms ease, background 120ms ease;
  }
  button:hover { opacity: 0.92; }
  button:active { transform: scale(0.98); }
  button.secondary {
    background: transparent;
    color: var(--ink);
    box-shadow: inset 0 0 0 1px var(--line-strong);
  }
  button.secondary:hover { background: var(--accent-soft); opacity: 1; }
  button.warning { background: var(--gold); color: var(--on-gold); }
  button.danger {
    background: transparent;
    color: var(--negative);
    box-shadow: inset 0 0 0 1px var(--line-strong);
  }
  button.danger:hover { background: var(--accent-soft); opacity: 1; }

  /* Layout helpers */
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: end; }
  .row > div { flex: 1; min-width: 140px; }

  /* Chip-style game-mode picker */
  .chip-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip {
    padding: 9px 18px;
    border-radius: 100px;
    background: var(--bg);
    color: var(--ink-soft);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: inset 0 0 0 1px var(--line);
    border: 0;
    font-family: inherit;
  }
  .chip.active {
    background: var(--ink);
    color: var(--bg);
    box-shadow: none;
  }

  /* Player input rows in setup */
  .player-inputs { display: flex; flex-direction: column; gap: 8px; margin: 4px 0 16px; }
  .player-inputs > div > label { display: none; }
  .player-input-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--bg);
    border-radius: var(--radius);
    box-shadow: inset 0 0 0 1px var(--line);
  }
  .player-input-row .seat {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: grid; place-items: center;
    background: var(--accent-soft);
    color: var(--ink);
    font-family: var(--font-num);
    font-size: 12px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .player-input-row > input {
    flex: 1; min-width: 0;
    border: 0; background: transparent;
    padding: 4px 0;
    font-size: 15px;
    border-radius: 0;
  }
  .player-input-row > input:focus { outline: none; border-color: transparent; }
  .team-toggle { display: inline-flex; gap: 4px; flex-shrink: 0; }
  .team-toggle button {
    background: transparent;
    color: var(--muted);
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 600;
    border-radius: 100px;
    box-shadow: inset 0 0 0 1px var(--line);
  }
  .team-toggle button.active {
    background: var(--ink);
    color: var(--bg);
    box-shadow: none;
  }

  /* Team setup: 2 columns side-by-side, players 1/3/5 vs 2/4/6 with a vs divider */
  .team-pair-setup {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 10px;
    align-items: start;
    margin: 8px 0 14px;
  }
  .team-col { display: flex; flex-direction: column; gap: 8px; min-width: 0; }
  .team-col-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--ink);
    color: var(--bg);
    border-radius: var(--radius);
  }
  .team-col-header .team-letter {
    width: 22px; height: 22px;
    border-radius: 50%;
    display: grid; place-items: center;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-num);
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .team-col-header input {
    flex: 1; min-width: 0;
    background: transparent;
    border: 0;
    color: var(--bg);
    font-size: 14px;
    font-weight: 600;
    padding: 0;
  }
  .team-col-header input::placeholder { color: rgba(255,255,255,0.5); }
  .team-col-header input:focus { outline: none; }
  .vs-divider {
    align-self: stretch;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-style: italic;
    color: var(--muted);
    padding: 0 2px;
    font-weight: 500;
  }
  @media (max-width: 600px) {
    .team-pair-setup { grid-template-columns: 1fr; gap: 8px; }
    .vs-divider { padding: 4px 0; }
  }

  /* Hint text */
  .threshold-info {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 12px;
    line-height: 1.4;
  }

  /* Standings: player grid (tiles) for Custom + Sebeeta */
  .player-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .player-tile {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px 14px 12px;
    box-shadow: inset 0 0 0 1px var(--line-strong);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 110px;
  }
  .player-tile.leader { box-shadow: inset 0 0 0 2px var(--gold); }
  .player-tile .pt-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .player-tile .pt-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.01em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .player-tile .pt-seat {
    font-family: var(--font-num);
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
  }
  .player-tile .pt-score {
    font-family: var(--font-num);
    font-weight: var(--num-weight);
    font-size: 38px;
    letter-spacing: -0.04em;
    color: var(--ink);
    line-height: 1;
    margin-top: 10px;
  }
  .player-tile .pt-bar {
    margin-top: 10px;
    height: 3px;
    border-radius: 3px;
    background: var(--line);
    overflow: hidden;
  }
  .player-tile .pt-bar > div {
    height: 100%;
    background: var(--ink);
    border-radius: 3px;
    transition: width 400ms cubic-bezier(.2,.7,.2,1);
  }
  .team-chip {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 1px 7px;
    border-radius: 100px;
    background: var(--accent-soft);
    color: var(--ink-soft);
    margin-inline-start: 6px;
    vertical-align: middle;
  }
  .dealer-badge {
    display: inline-block;
    background: var(--gold);
    color: var(--on-gold);
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 4px;
    margin-inline-start: 6px;
    vertical-align: middle;
  }
  .winner-badge {
    display: inline-block;
    background: var(--positive);
    color: var(--on-positive);
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 4px;
    margin-inline-start: 6px;
    vertical-align: middle;
  }

  /* Team tiles (Kout) */
  .team-stack { display: flex; flex-direction: column; gap: 10px; }
  .team-tile {
    background: var(--tile-warm);
    border-radius: var(--radius-l);
    padding: 18px;
    position: relative;
    box-shadow: inset 0 0 0 1px var(--line-strong);
    overflow: hidden;
    -webkit-backdrop-filter: blur(8px);
    backdrop-filter: blur(8px);
  }
  .team-tile.leader { box-shadow: inset 0 0 0 2px var(--gold); }
  .team-tile .team-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  .team-tile .team-name {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .team-tile .members {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }
  .team-tile .team-score {
    font-family: var(--font-num);
    font-weight: var(--num-weight);
    font-size: 52px;
    letter-spacing: -0.04em;
    line-height: 1;
    margin-top: 14px;
  }
  .team-tile .team-bar {
    height: 4px;
    border-radius: 4px;
    background: var(--line);
    overflow: hidden;
    margin-top: 12px;
  }
  .team-tile .team-bar > div {
    height: 100%;
    background: var(--ink);
    border-radius: 4px;
    transition: width 500ms cubic-bezier(.2,.7,.2,1);
  }

  /* Top-scorer summary (Sebeeta) */
  .team-summary {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .team-summary-card {
    background: var(--tile-warm);
    border-radius: var(--radius);
    padding: 12px 14px;
    box-shadow: inset 0 0 0 1px var(--line-strong);
    -webkit-backdrop-filter: blur(8px);
    backdrop-filter: blur(8px);
  }
  .team-summary-card .label {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .team-summary-card .value {
    font-family: var(--font-num);
    font-size: 28px;
    font-weight: var(--num-weight);
    letter-spacing: -0.03em;
    color: var(--ink);
  }

  /* Round entry */
  .round-entry-list {
    display: flex;
    flex-direction: column;
    margin: 4px 0 14px;
  }
  .entry-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--line);
  }
  .entry-row:last-child { border-bottom: 0; }
  .entry-row .seat {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: grid; place-items: center;
    background: var(--accent-soft);
    font-family: var(--font-num);
    font-size: 11px;
    color: var(--ink);
    flex-shrink: 0;
  }
  .entry-row .who {
    flex: 1; min-width: 0;
    font-size: 14px;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .entry-row .who .members {
    display: block;
    font-size: 11px;
    color: var(--muted);
    font-weight: 400;
    margin-top: 1px;
  }
  .entry-row input[type="number"] {
    width: 80px;
    text-align: center;
    font-family: var(--font-num);
    font-weight: 600;
    padding: 8px 10px;
    font-size: 15px;
  }
  .entry-row .minus-btn {
    background: transparent;
    color: var(--negative);
    padding: 5px 11px;
    font-size: 12px;
    font-weight: 600;
    border-radius: 100px;
    box-shadow: inset 0 0 0 1px var(--line-strong);
  }
  .entry-row .minus-btn:hover { background: rgba(193,67,47,0.06); opacity: 1; }
  .entry-row .minus-btn.active {
    background: var(--negative);
    color: white;
    box-shadow: none;
  }

  /* Actions bar */
  .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }

  /* Top-of-game actions (Reset / New Game) — sits above the standings card */
  .game-top-actions {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    justify-content: flex-end;
  }
  .game-top-actions button {
    padding: 9px 16px;
    font-size: 13px;
  }
  @media (max-width: 600px) {
    .game-top-actions { justify-content: stretch; }
    .game-top-actions button { flex: 1; padding: 10px 12px; font-size: 13px; }
  }

  /* Kout contract entry */
  .entry-mode-toggle {
    display: inline-flex;
    gap: 2px;
    padding: 3px;
    background: var(--bg);
    border-radius: 100px;
    box-shadow: inset 0 0 0 1px var(--line);
    margin-bottom: 14px;
  }
  .entry-mode-toggle button {
    background: transparent;
    color: var(--muted);
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 600;
    border-radius: 100px;
    letter-spacing: -0.1px;
  }
  .entry-mode-toggle button.active {
    background: var(--ink);
    color: var(--bg);
  }
  .contract-section { margin-bottom: 12px; }
  .contract-section .label {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .contract-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .contract-chips .chip {
    padding: 8px 16px;
    font-size: 13px;
  }
  .contract-chips .chip.outcome-win.active { background: var(--positive); color: var(--on-positive); }
  .contract-chips .chip.outcome-fail.active { background: var(--negative); color: var(--on-negative); }
  .contract-preview {
    background: var(--bg);
    border-radius: var(--radius);
    padding: 14px 16px;
    box-shadow: inset 0 0 0 1px var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 14px;
    margin: 14px 0 12px;
  }
  .contract-preview .team-result {
    flex: 1;
    min-width: 0;
  }
  .contract-preview .team-result .label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .contract-preview .team-result .value {
    font-family: var(--font-num);
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .contract-preview .team-result.win .value { color: var(--positive); }
  .contract-preview .vs {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .contract-hint {
    color: var(--muted);
    font-size: 12px;
    text-align: center;
    padding: 12px 0;
  }

  /* History table */
  table { width: 100%; border-collapse: collapse; }
  th, td {
    padding: 10px 8px;
    text-align: center;
    border-bottom: 1px solid var(--line);
    font-size: 13px;
    color: var(--ink-soft);
  }
  th {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 600;
    color: var(--muted);
    border-bottom: 1px solid var(--line-strong);
  }
  td .running {
    display: block;
    color: var(--muted);
    font-size: 11px;
    font-family: var(--font-num);
    margin-top: 2px;
  }
  #historyTable input[type="number"] {
    width: 70px;
    padding: 6px 8px;
    font-size: 13px;
    text-align: center;
    font-family: var(--font-num);
    font-weight: 600;
  }
  #historyBody button {
    padding: 5px 10px;
    font-size: 11px;
    border-radius: 100px;
  }

  /* Winner banner */
  .winner-banner {
    background: var(--ink);
    color: var(--bg);
    padding: 22px;
    border-radius: var(--radius-l);
    text-align: center;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin-bottom: 14px;
  }

  .hidden { display: none !important; }

  /* Screen containers */
  .screen {
    animation: fadein 180ms ease-out;
  }
  @keyframes fadein {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .screen-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    gap: 10px;
  }
  .screen-toolbar .screen-title {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.01em;
    flex: 1;
    text-align: center;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .screen-toolbar .screen-title .eyebrow {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--muted);
    font-weight: 600;
  }
  .icon-btn {
    width: 40px; height: 40px;
    border-radius: 999px;
    display: grid; place-items: center;
    background: transparent;
    color: var(--ink);
    font-size: 22px;
    line-height: 1;
    padding: 0;
    border: 0;
    cursor: pointer;
  }
  .icon-btn:hover { background: var(--accent-soft); opacity: 1; }
  .icon-btn.with-label {
    width: auto;
    height: auto;
    padding: 8px 14px 8px 12px;
    border-radius: 999px;
    background: var(--surface-elev);
    box-shadow: inset 0 0 0 1px var(--line);
    -webkit-backdrop-filter: var(--glass-blur);
    backdrop-filter: var(--glass-blur);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
  }
  .icon-btn.with-label .icon-glyph { font-size: 18px; line-height: 1; }
  .icon-btn.with-label .icon-label { font-size: 13px; }

  /* Home screen */
  .home-hero {
    padding: 14px 4px 22px;
  }
  .home-hero .eyebrow {
    display: block;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .home-hero .heading {
    font-size: 36px;
    font-weight: 600;
    letter-spacing: -0.03em;
    line-height: 1.05;
    margin: 0 0 8px;
    color: var(--ink);
  }
  .home-hero .sub {
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.4;
    max-width: 360px;
  }
  .home-body {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .game-card {
    background: var(--surface);
    border-radius: var(--radius-l);
    padding: 0;
    box-shadow: var(--shadow-card);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 0;
    text-align: start;
    color: var(--ink);
    width: 100%;
    overflow: hidden;
    transition: box-shadow 120ms ease, transform 120ms ease;
  }
  .game-card:hover { box-shadow: var(--shadow-lift); transform: translateY(-1px); opacity: 1; }
  .game-card .gc-art {
    width: 100%;
    height: 130px;
    background: linear-gradient(180deg, #f8f6f0, #ede9dd);
    display: grid; place-items: center;
    overflow: hidden;
    border-bottom: 1px solid var(--line);
  }
  .game-card .gc-art {
    /* Lock the card artwork to LTR so the SVG coords + <text> anchoring
       render identically in both languages */
    direction: ltr;
    unicode-bidi: isolate;
  }
  .game-card .gc-art svg {
    width: 100%;
    height: 100%;
    display: block;
    direction: ltr;
  }
  .game-card .gc-art[data-game="kout"]   { background: linear-gradient(180deg, #f0f4ee, #d8e6d7); }
  .game-card .gc-art[data-game="sebeeta"]{ background: linear-gradient(180deg, #fdf3f0, #f3d9d3); }
  .game-card .gc-art[data-game="custom"] { background: linear-gradient(180deg, #eef0f5, #d4d9e3); }
  .game-card .gc-meta { flex: 1; min-width: 0; padding: 18px; }
  .game-card .gc-meta .name {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .game-card .gc-meta .desc {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
    line-height: 1.4;
  }
  .game-card .gc-meta .meta-row {
    display: flex; gap: 8px;
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 8px;
  }
  .resume-row button {
    width: 100%;
    background: var(--gold);
    color: var(--ink);
    padding: 14px 20px;
    font-size: 15px;
    font-weight: 600;
  }
  .recent-section { padding-top: 8px; }
  .recent-section h3 {
    font-family: inherit;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 10px;
    padding: 0 4px;
  }
  .recent-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px;
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow-card);
    margin-bottom: 8px;
    cursor: default;
    text-align: start;
    width: 100%;
  }
  .recent-row .left .game-name { font-weight: 600; font-size: 14px; }
  .recent-row .left .when { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .recent-row .right { text-align: end; }
  .recent-row .right .winner { font-size: 13px; color: var(--ink-soft); font-weight: 500; }
  .recent-row .right .score { font-family: var(--font-num); font-size: 13px; color: var(--ink); font-weight: 600; }

  /* Play screen — bottom action bar */
  .play-body { padding-bottom: 4px; }
  .play-actions {
    position: sticky;
    bottom: 12px;
    margin-top: 14px;
    display: flex;
    gap: 8px;
    align-items: center;
    /* glass treatment handled by the shared rule above; just keep layout here */
    padding: 8px;
    border-radius: var(--radius-l);
    box-shadow: var(--shadow-lift);
  }
  .play-actions .undo-btn {
    flex: 0 0 auto;
    width: 56px;
    padding: 0;
    height: 52px;
    font-size: 20px;
    line-height: 1;
  }
  .play-actions .record-btn {
    flex: 1;
    padding: 16px 20px;
    font-size: 15px;
    display: inline-flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    height: 52px;
  }
  .play-actions .record-btn .plus {
    font-size: 18px;
    line-height: 1;
  }
  .play-actions .record-btn[disabled] {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .game-meta-actions {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 10px 0 4px;
  }
  .game-meta-actions button {
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
    border-radius: 100px;
  }
  .game-meta-actions .reset-btn {
    background: var(--gold);
    color: var(--on-gold);
    box-shadow: none;
  }
  .game-meta-actions .reset-btn:hover { filter: brightness(0.95); opacity: 1; }
  .game-meta-actions .newgame-btn {
    background: var(--negative);
    color: var(--on-negative);
    box-shadow: none;
  }
  .game-meta-actions .newgame-btn:hover { filter: brightness(0.95); opacity: 1; }

  /* Bottom sheet */
  .sheet-scrim {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.32);
    z-index: 100;
    opacity: 0;
    transition: opacity 240ms ease;
    pointer-events: none;
  }
  .sheet-scrim:not(.hidden) { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    background: var(--surface);
    border-radius: 28px 28px 0 0;
    z-index: 101;
    transform: translateY(100%);
    transition: transform 320ms cubic-bezier(.2,.7,.2,1);
    display: flex;
    flex-direction: column;
    max-height: 88vh;
    box-shadow: 0 -20px 40px -20px rgba(0,0,0,0.32);
  }
  .sheet:not(.hidden) { transform: translateY(0); }
  .sheet .grabber {
    width: 36px; height: 4px;
    border-radius: 4px;
    background: var(--line-strong);
    margin: 10px auto 6px;
    flex-shrink: 0;
  }
  .sheet-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 22px 14px;
    flex-shrink: 0;
  }
  .sheet-header h2 {
    margin: 0;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--ink);
    text-transform: none;
  }
  .sheet-body {
    padding: 0 22px 16px;
    overflow-y: auto;
    flex: 1;
    min-height: 0;
    max-width: 720px;
    margin: 0 auto;
    width: 100%;
  }
  .sheet-foot {
    padding: 12px 22px 22px;
    border-top: 1px solid var(--line);
    display: flex;
    gap: 10px;
    flex-shrink: 0;
    background: var(--surface-elev);
    -webkit-backdrop-filter: var(--glass-blur);
    backdrop-filter: var(--glass-blur);
  }
  .sheet-foot button { flex: 1; }

  /* Numpad (Sebeeta + Custom: optional numpad entry style) */
  .numpad-section {
    background: var(--bg);
    border-radius: var(--radius);
    padding: 12px;
    margin-bottom: 12px;
    box-shadow: inset 0 0 0 1px var(--line);
  }
  .numpad-context {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    gap: 8px;
  }
  .numpad-context .seat {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: grid; place-items: center;
    background: var(--accent-soft);
    font-family: var(--font-num);
    font-size: 12px;
    font-weight: 700;
    color: var(--ink);
  }
  .numpad-context .who {
    flex: 1;
    font-size: 14px;
    font-weight: 600;
  }
  .numpad-display {
    background: var(--surface);
    border-radius: var(--radius-s);
    padding: 14px;
    text-align: center;
    font-family: var(--font-num);
    font-size: 32px;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin-bottom: 10px;
    min-height: 56px;
    box-shadow: inset 0 0 0 1px var(--line);
  }
  .numpad-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }
  .numpad-grid button {
    background: var(--surface);
    color: var(--ink);
    font-family: var(--font-num);
    font-size: 18px;
    font-weight: 600;
    padding: 14px 0;
    border-radius: var(--radius-s);
    box-shadow: inset 0 0 0 1px var(--line);
  }
  .numpad-grid button:hover { background: var(--accent-soft); opacity: 1; }
  .numpad-grid button.np-action { background: var(--ink); color: var(--bg); box-shadow: none; }
  .numpad-grid button.np-sign { background: var(--bg); }
  .numpad-grid button.np-pen {
    background: var(--negative);
    color: white;
    box-shadow: none;
    font-size: 13px;
  }
  .numpad-nav button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 13px;
    line-height: 1;
    padding: 12px 6px;
  }
  .numpad-nav .np-arrow { font-size: 18px; line-height: 1; }
  .numpad-nav .np-label { font-size: 12px; font-weight: 600; }
  .numpad-nav button[disabled] { opacity: 0.35; cursor: not-allowed; }
  /* In RTL the arrows should mirror */
  html[dir="rtl"] .numpad-nav .np-arrow { transform: scaleX(-1); display: inline-block; }
  .entry-style-toggle {
    display: inline-flex;
    gap: 2px;
    padding: 3px;
    background: var(--bg);
    border-radius: 100px;
    box-shadow: inset 0 0 0 1px var(--line);
    margin-bottom: 12px;
  }
  .entry-style-toggle button {
    background: transparent;
    color: var(--muted);
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 600;
    border-radius: 100px;
  }
  .entry-style-toggle button.active {
    background: var(--ink);
    color: var(--bg);
  }

  /* Winner screen */
  .winner-stage {
    padding: 60px 22px 40px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    min-height: 60vh;
    justify-content: center;
  }
  .winner-crest {
    font-size: 80px;
    line-height: 1;
    margin-bottom: 12px;
  }
  .winner-eyebrow {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
  }
  .winner-name {
    font-size: 44px;
    font-weight: 600;
    letter-spacing: -0.04em;
    color: var(--ink);
    line-height: 1.05;
    margin: 8px 0 4px;
    word-wrap: break-word;
    max-width: 100%;
  }
  .winner-score {
    font-family: var(--font-num);
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--gold);
  }
  .winner-meta {
    font-size: 13px;
    color: var(--muted);
    margin-top: 8px;
  }
  .winner-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 32px;
    justify-content: center;
  }
  .winner-actions button { padding: 12px 22px; }
  html[dir="rtl"] .winner-score, html[dir="rtl"] .winner-name { direction: ltr; unicode-bidi: isolate; }
  html[dir="rtl"] .winner-name { direction: inherit; unicode-bidi: normal; }

  /* Landscape layout for tablets / wide screens */
  @media (min-width: 900px) and (orientation: landscape) {
    .container { max-width: 1400px; }
    .game-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      align-items: start;
    }
    .game-grid > .card { margin-bottom: 0; }
    .history-card { grid-column: 1 / -1; }
  }

  /* Compact phone */
  @media (max-width: 600px) {
    body { padding: 12px; }
    .card { padding: 16px; border-radius: var(--radius); margin-bottom: 10px; }
    .app-header h1 { font-size: 22px; }
    .player-tile { padding: 12px 12px 10px; min-height: 100px; }
    .player-tile .pt-score { font-size: 32px; margin-top: 8px; }
    .team-tile .team-score { font-size: 44px; }
    .entry-row { padding: 8px 0; gap: 8px; }
    .entry-row input[type="number"] { width: 64px; padding: 6px 8px; font-size: 14px; }
    .entry-row .minus-btn { padding: 4px 9px; font-size: 11px; }
    button { padding: 11px 16px; font-size: 14px; }
    .winner-banner { font-size: 16px; padding: 18px; }
  }
</style>
</head>

      gameCustomDesc: 'قيد مفتوح. من 2 إلى 6 لاعبين، أي هدف، قواعدك أنت.',
