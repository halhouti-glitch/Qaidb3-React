  let state = {
    gameMode: 'sebeeta', // 'sebeeta' | 'kout' | 'custom'
    players: [],
    playerTeam: [],      // team index (0 or 1) per player; used in sebeeta + kout
    teamNames: [],       // custom names for the two teams (sebeeta + kout)
    scores: [],          // custom/sebeeta: per-player arrays; kout: per-team [a,b] arrays
    threshold: 201,
    winRule: 'lowest',
    gameOver: false,
    gameLogged: false,   // true once the finished game has been pushed to recentGames
    lang: 'ar',
    koutEntryMode: 'contract',     // 'contract' | 'manual' — for Kout round entry
    entryStyle: 'numpad',          // 'numpad' | 'pm' — for Sebeeta + Custom score entry
    currentScreen: 'home',         // 'home' | 'setup' | 'play' | 'history' | 'winner'
    recentGames: [],               // array of { kind, players, when, winner, score, teamNames }
    theme: 'light'                 // 'light' | 'dark' — UI theme
  };
  let editingRound = null; // index of round currently being edited (UI state, not persisted)

  // Kout contract entry — caller (0=Alif, 1=Baa), level, outcome ('made'|'failed').
  // Lives outside `state` because it's per-round-in-progress, cleared on submit.
  let koutContract = { caller: null, level: null, outcome: null };

  // Contract scoring table: { level: { made: <caller>, failed: <opponent> } }
  const KOUT_CONTRACT_SCORES = {
    bab:     { made: 5,  failed: 10 },
    '6':     { made: 6,  failed: 12 },
    '7':     { made: 7,  failed: 14 },
    '8':     { made: 8,  failed: 16 },
    bawan:   { made: 36, failed: 18 },
    malzoom: { made: 5,  failed: 5 },
  };
  const KOUT_LEVELS = ['bab', '6', '7', '8', 'bawan', 'malzoom'];

  function koutLevelLabel(level) {
    if (level === 'bab') return t('levelBab');
    if (level === 'bawan') return t('levelBawan');
    if (level === 'malzoom') return t('levelMalzoom');
    return level; // '6', '7', '8'
  }

  // Compute [teamAScore, teamBScore] for a contract. Returns [0,0] if incomplete.
  function computeContractScore(caller, level, outcome) {
    if (caller === null || !level || !outcome) return [0, 0];
    const cfg = KOUT_CONTRACT_SCORES[level];
    if (!cfg) return [0, 0];
    const out = [0, 0];
    if (outcome === 'made') out[caller] = cfg.made;
    else out[1 - caller] = cfg.failed;
    return out;
  }

  function setKoutEntryMode(mode) {
    state.koutEntryMode = mode;
    save();
    render();
  }

  function setContractCaller(c) {
    koutContract.caller = (koutContract.caller === c) ? null : c;
    render();
  }
  function setContractLevel(l) {
    koutContract.level = (koutContract.level === l) ? null : l;
    render();
  }
  function setContractOutcome(o) {
    koutContract.outcome = (koutContract.outcome === o) ? null : o;
    render();
  }
  function resetContract() {
    koutContract = { caller: null, level: null, outcome: null };
  }

  // Per-player color palette (cycles if >6, but we cap at 6 anyway)
  const PLAYER_COLORS = ['#ec4899', '#06b6d4', '#facc15', '#a855f7', '#f97316', '#84cc16'];
  function pcolor(i) { return PLAYER_COLORS[i % PLAYER_COLORS.length]; }
  function pdot(i) { return `<span class="pdot" style="background:${pcolor(i)}"></span>`; }

  // Team colors (used in sebeeta + kout)
  const TEAM_COLORS = ['#06b6d4', '#ec4899'];
  function tcolor(i) { return TEAM_COLORS[i] || '#475569'; }
  function tdot(i) { return `<span class="pdot" style="background:${tcolor(i)}"></span>`; }
  function teamName(i) {
    // Prefer custom name from state when set; fall back to the i18n default.
    const custom = (state.teamNames && state.teamNames[i] && state.teamNames[i].trim());
    if (custom) return custom;
    return i === 0 ? t('teamAFull') : t('teamBFull');
  }
  function isTeamMode() { return state.gameMode === 'sebeeta' || state.gameMode === 'kout'; }

  // Per-entity color (player color for player rows, team color for team rows / kout)
  function eColor(i) { return state.gameMode === 'kout' ? tcolor(i) : pcolor(i); }

  const STORAGE_KEY = 'cardScoreTracker_v1';

  function t(key) { return I18N[state.lang][key]; }

  function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  function load() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    try {
      const loaded = JSON.parse(raw);
      state = { ...state, ...loaded };
      applyTheme();
      applyLang();
      // Decide initial screen: respect saved currentScreen if it's a real screen
      // with the data to support it; otherwise fall back to home.
      let target = state.currentScreen || 'home';
      if (target === 'play' && (!state.players || state.players.length === 0)) target = 'home';
      if (target === 'winner' && !state.gameLogged) target = 'play';
      navigate(target);
      return true;
    } catch (e) {}
    return false;
  }

  function setLang(lang) {
    state.lang = lang;
    save();
    applyLang();
    if (state.players.length) render();
  }

  // ===== Theme (light / dark) =====
  function applyTheme() {
    const theme = state.theme === 'dark' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', theme);
    const icon = document.getElementById('themeIcon');
    if (icon) icon.textContent = theme === 'dark' ? '☾' : '☀';
  }
  function toggleTheme() {
    state.theme = state.theme === 'dark' ? 'light' : 'dark';
    save();
    applyTheme();
  }

  function applyLang() {
    const html = document.documentElement;
    html.setAttribute('lang', state.lang);
    html.setAttribute('dir', state.lang === 'ar' ? 'rtl' : 'ltr');
    document.getElementById('langPicker').value = state.lang;
    document.title = t('title');
    document.querySelectorAll('[data-t]').forEach(el => {
      const key = el.getAttribute('data-t');
      const val = t(key);
      if (typeof val === 'string') el.textContent = val;
    });
  }

  // ===== Screen routing =====
  const SCREENS = ['home', 'setup', 'play', 'history', 'winner'];
  function navigate(screen) {
    if (!SCREENS.includes(screen)) return;
    state.currentScreen = screen;
    SCREENS.forEach(s => {
      const el = document.getElementById('screen-' + s);
      if (el) el.classList.toggle('hidden', s !== screen);
    });
    // Close the sheet whenever we navigate
    if (screen !== 'play') closeSheet();
    save();
    render();
  }

  // ===== Home screen =====
  function pickGame(mode) {
    selectedSetupMode = mode;
    navigate('setup');
    // Mode-specific form state (hides threshold/winRule + locks numPlayers for team modes)
    onGameModeChange();
    // For team modes there's no config step — jump straight to player/team setup
    if (mode === 'sebeeta' || mode === 'kout') {
      buildPlayerInputs();
    }
  }

  function renderHome() {
    // Resume row: show if there's an active game with scores
    const hasActive = state.players.length > 0 && state.scores.length > 0 && !state.gameOver;
    document.getElementById('resumeRow').classList.toggle('hidden', !hasActive);

    // Recent games list
    const list = document.getElementById('recentList');
    list.innerHTML = '';
    const recents = state.recentGames || [];
    if (recents.length === 0) {
      document.getElementById('recentSection').classList.add('hidden');
    } else {
      document.getElementById('recentSection').classList.remove('hidden');
      recents.slice(0, 5).forEach(g => {
        const gameNameKey = g.kind === 'kout' ? 'gameKout' : g.kind === 'sebeeta' ? 'gameSebeeta' : 'gameCustom';
        const when = relativeWhen(g.when);
        const row = document.createElement('div');
        row.className = 'recent-row';
        row.innerHTML = `
          <div class="left">
            <div class="game-name">${escapeHtml(t(gameNameKey))} · ${escapeHtml(g.players.join(', '))}</div>
            <div class="when">${escapeHtml(when)} · ${escapeHtml(t('roundsPlayed')(g.roundCount || 0))}</div>
          </div>
          <div class="right">
            <div class="winner">${escapeHtml(g.winner || '')}</div>
            <div class="score">${escapeHtml(g.score || '')}</div>
          </div>`;
        list.appendChild(row);
      });
    }
  }

  function relativeWhen(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    const now = new Date();
    const diffMs = now - d;
    const diffH = diffMs / 3600000;
    if (diffH < 1) return state.lang === 'ar' ? 'قبل قليل' : 'Just now';
    if (diffH < 24) return state.lang === 'ar' ? 'اليوم' : 'Today';
    if (diffH < 48) return state.lang === 'ar' ? 'أمس' : 'Yesterday';
    const days = Math.floor(diffH / 24);
    if (days < 7) return state.lang === 'ar' ? `قبل ${days} أيام` : `${days} days ago`;
    return d.toLocaleDateString(state.lang === 'ar' ? 'ar' : 'en');
  }

  // ===== Recent games — log a finished game =====
  function logFinishedGame(winnerObj, totalsArr) {
    if (state.gameLogged) return;
    const recent = {
      kind: state.gameMode,
      players: state.players.slice(),
      teamNames: state.teamNames ? state.teamNames.slice() : [],
      when: Date.now(),
      roundCount: state.scores.length,
      winner: winnerObj.type === 'player' ? state.players[winnerObj.idx] : teamName(winnerObj.idx),
      score: state.gameMode === 'kout'
        ? `${totalsArr[0]}–${totalsArr[1]}`
        : (winnerObj.type === 'player' ? `${totalsArr[winnerObj.idx]}` : `${totalsArr.join(' / ')}`)
    };
    state.recentGames = [recent, ...(state.recentGames || [])].slice(0, 10);
    state.gameLogged = true;
  }

  // ===== Bottom sheet for round entry =====
  function openSheet() {
    if (state.gameOver) return;
    // Kout always opens in Contract mode and with a fresh picker
    if (state.gameMode === 'kout') {
      state.koutEntryMode = 'contract';
      resetContract();
    }
    document.getElementById('sheetScrim').classList.remove('hidden');
    document.getElementById('sheet').classList.remove('hidden');
    document.getElementById('sheetRoundNum').textContent = state.scores.length + 1;
    renderSheet();
    // Lock body scroll while sheet is open
    document.body.style.overflow = 'hidden';
    // Focus first input after sheet animates in
    setTimeout(() => {
      const first = document.getElementById('roundScore0');
      if (first) first.focus();
    }, 320);
  }
  function closeSheet() {
    document.getElementById('sheetScrim').classList.add('hidden');
    document.getElementById('sheet').classList.add('hidden');
    document.body.style.overflow = '';
  }

  // ===== Winner-screen actions =====
  function winnerNewGame() {
    // Keep players + teams, just clear scores and go back to play
    state.scores = [];
    state.gameOver = false;
    state.gameLogged = false;
    editingRound = null;
    resetContract();
    save();
    navigate('play');
  }
  function winnerHome() {
    navigate('home');
  }

  // Track the currently-selected game mode in the setup UI (chip picker)
  let selectedSetupMode = 'sebeeta';

  function setGameMode(mode) {
    selectedSetupMode = mode;
    document.querySelectorAll('#gameModeChips .chip').forEach(chip => {
      chip.classList.toggle('active', chip.getAttribute('data-mode') === mode);
    });
    onGameModeChange();
  }

  function onGameModeChange() {
    const mode = selectedSetupMode;
    const isTeam = (mode === 'sebeeta' || mode === 'kout');
    // For team modes the config row is hidden entirely (numPlayers locked at 6,
    // threshold + winRule are presets, no need for a "Done" step).
    document.getElementById('setupConfigRow').classList.toggle('hidden', isTeam);
    document.getElementById('thresholdWrap').style.display = isTeam ? 'none' : '';
    document.getElementById('winRuleWrap').style.display = isTeam ? 'none' : '';
    if (isTeam) {
      const np = document.getElementById('numPlayers');
      np.value = 6;
      np.disabled = true;
    } else {
      document.getElementById('numPlayers').disabled = false;
    }
    document.getElementById('playerNameSection').classList.add('hidden');
  }

  // Tracks team selection per player slot during setup (UI-only state)
  let setupTeams = [];

  function setSetupTeam(i, team) {
    setupTeams[i] = team;
    // Update visual state of the two toggle buttons
    const aBtn = document.getElementById(`teamBtn_${i}_a`);
    const bBtn = document.getElementById(`teamBtn_${i}_b`);
    if (aBtn && bBtn) {
      aBtn.classList.toggle('active', team === 0);
      bBtn.classList.toggle('active', team === 1);
    }
  }

  function buildPlayerInputs() {
    const mode = selectedSetupMode;
    const isTeam = (mode === 'sebeeta' || mode === 'kout');
    const n = isTeam ? 6 : Math.max(2, Math.min(6, parseInt(document.getElementById('numPlayers').value) || 2));
    document.getElementById('numPlayers').value = n;

    // Hint text under "Player Names"
    const hint = document.getElementById('setupHint');
    if (mode === 'sebeeta') hint.textContent = t('sebeetaHint');
    else if (mode === 'kout') hint.textContent = t('koutHint');
    else hint.textContent = '';

    // Team assignment is fixed by position: players 1,3,5 → team 0; players 2,4,6 → team 1.
    setupTeams = [];
    for (let i = 0; i < n; i++) setupTeams.push(isTeam ? (i % 2) : 0);

    const container = document.getElementById('playerInputs');
    container.innerHTML = '';

    if (isTeam) {
      // 2-column layout with vs divider. Team 0 holds players 1,3,5 (indices 0,2,4);
      // Team 1 holds players 2,4,6 (indices 1,3,5).
      const pair = document.createElement('div');
      pair.className = 'team-pair-setup';

      [0, 1].forEach(ti => {
        const col = document.createElement('div');
        col.className = 'team-col';

        // Team name header (dark pill with team letter + name input)
        const header = document.createElement('div');
        header.className = 'team-col-header';
        const letter = document.createElement('span');
        letter.className = 'team-letter';
        letter.textContent = ti === 0 ? t('teamA') : t('teamB');
        header.appendChild(letter);
        const teamInput = document.createElement('input');
        teamInput.type = 'text';
        teamInput.id = 'teamNameInput' + ti;
        const defaultName = ti === 0 ? t('teamAFull') : t('teamBFull');
        teamInput.value = defaultName;
        teamInput.placeholder = defaultName;
        header.appendChild(teamInput);
        col.appendChild(header);

        // Three player slots for this team
        for (let slot = 0; slot < 3; slot++) {
          const playerIdx = ti + slot * 2; // team 0: 0,2,4 — team 1: 1,3,5
          const row = document.createElement('div');
          row.className = 'player-input-row';
          const seat = document.createElement('div');
          seat.className = 'seat';
          seat.textContent = (playerIdx + 1).toString();
          row.appendChild(seat);
          const input = document.createElement('input');
          input.type = 'text';
          input.id = 'playerName' + playerIdx;
          input.value = `${t('playerDefault')} ${playerIdx + 1}`;
          input.placeholder = `${t('playerDefault')} ${playerIdx + 1}`;
          row.appendChild(input);
          col.appendChild(row);
        }

        pair.appendChild(col);

        // Insert "vs" between the two columns
        if (ti === 0) {
          const vs = document.createElement('div');
          vs.className = 'vs-divider';
          vs.textContent = 'vs';
          pair.appendChild(vs);
        }
      });

      container.appendChild(pair);
    } else {
      // Custom mode — flat list of player rows
      for (let i = 0; i < n; i++) {
        const wrap = document.createElement('div');
        const row = document.createElement('div');
        row.className = 'player-input-row';
        const seat = document.createElement('div');
        seat.className = 'seat';
        seat.textContent = (i + 1).toString();
        row.appendChild(seat);
        const input = document.createElement('input');
        input.type = 'text';
        input.id = 'playerName' + i;
        input.value = `${t('playerDefault')} ${i+1}`;
        input.placeholder = `${t('playerDefault')} ${i+1}`;
        row.appendChild(input);
        wrap.appendChild(row);
        container.appendChild(wrap);
      }
    }
    document.getElementById('playerNameSection').classList.remove('hidden');
  }

  function startGame() {
    const mode = selectedSetupMode;
    const isTeam = (mode === 'sebeeta' || mode === 'kout');
    const n = isTeam ? 6 : parseInt(document.getElementById('numPlayers').value);

    const players = [];
    for (let i = 0; i < n; i++) {
      const name = document.getElementById('playerName' + i).value.trim() || `${t('playerDefault')} ${i+1}`;
      players.push(name);
    }

    if (isTeam) {
      // Validate balanced teams: must be exactly 3 / 3
      const aCount = setupTeams.filter(x => x === 0).length;
      const bCount = setupTeams.filter(x => x === 1).length;
      if (aCount !== 3 || bCount !== 3) {
        alert(t('teamUneven')(aCount, bCount));
        return;
      }
      state.playerTeam = setupTeams.slice();
      // Capture custom team names (fall back to defaults if blank)
      const nameA = (document.getElementById('teamNameInput0')?.value || '').trim() || t('teamAFull');
      const nameB = (document.getElementById('teamNameInput1')?.value || '').trim() || t('teamBFull');
      state.teamNames = [nameA, nameB];
    } else {
      state.playerTeam = [];
      state.teamNames = [];
    }

    state.gameMode = mode;
    state.players = players;
    state.scores = [];
    state.gameOver = false;

    if (mode === 'sebeeta') {
      state.threshold = 201;
      state.winRule = 'lowest';  // individual lowest wins (anyone hitting 201 = team loses)
    } else if (mode === 'kout') {
      state.threshold = 101;
      state.winRule = 'highest'; // first team to 101 wins
    } else {
      state.threshold = parseInt(document.getElementById('threshold').value) || 201;
      state.winRule = document.getElementById('winRule').value;
    }

    state.currentScreen = 'play';
    save();
    navigate('play');
  }

  // Returns per-entity totals.
  //   custom/sebeeta: one total per player
  //   kout: one total per team [A, B]
  function totals() {
    const n = state.gameMode === 'kout' ? 2 : state.players.length;
    const out = new Array(n).fill(0);
    state.scores.forEach(round => {
      for (let i = 0; i < n; i++) out[i] += (round[i] || 0);
    });
    return out;
  }

  // For sebeeta only: sum per-player totals into per-team totals [A, B]
  function teamTotalsFromPlayers(pTotals) {
    const t = [0, 0];
    state.playerTeam.forEach((tIdx, pIdx) => { t[tIdx] += (pTotals[pIdx] || 0); });
    return t;
  }

  // Dealer at the *player* level — same logic as before, only meaningful for
  // custom + sebeeta (kout has no individual dealer).
  function dealerIndex(totalsArr) {
    if (state.gameMode === 'kout' || totalsArr.length === 0) return -1;
    if (state.winRule === 'highest') {
      let min = Infinity, idx = 0;
      totalsArr.forEach((v, i) => { if (v < min) { min = v; idx = i; } });
      return idx;
    } else {
      let max = -Infinity, idx = 0;
      totalsArr.forEach((v, i) => { if (v > max) { max = v; idx = i; } });
      return idx;
    }
  }

  // Returns { type: 'player' | 'team', idx } when there's a winner, else null.
  //   custom: winner is a player (highest or lowest depending on winRule)
  //   sebeeta: winner is the OPPOSING team of any player who hit threshold
  //   kout: winner is the team that hit the threshold
  function checkWinner(totalsArr) {
    if (state.gameMode === 'sebeeta') {
      for (let i = 0; i < totalsArr.length; i++) {
        if (totalsArr[i] >= state.threshold) {
          const loserTeam = state.playerTeam[i];
          return { type: 'team', idx: 1 - loserTeam };
        }
      }
      return null;
    }
    if (state.gameMode === 'kout') {
      // First team to reach threshold; if both crossed in the same round, the higher wins
      const reached = totalsArr.map((v, i) => v >= state.threshold ? i : -1).filter(i => i >= 0);
      if (reached.length === 0) return null;
      let max = -Infinity, idx = -1;
      reached.forEach(i => { if (totalsArr[i] > max) { max = totalsArr[i]; idx = i; } });
      return { type: 'team', idx };
    }
    // custom
    if (state.winRule === 'highest') {
      const reached = totalsArr.map((v, i) => v >= state.threshold ? i : -1).filter(i => i >= 0);
      if (reached.length === 0) return null;
      let max = -Infinity, idx = -1;
      reached.forEach(i => { if (totalsArr[i] > max) { max = totalsArr[i]; idx = i; } });
      return { type: 'player', idx };
    } else {
      const anyReached = totalsArr.some(v => v >= state.threshold);
      if (!anyReached) return null;
      let min = Infinity, idx = -1;
      totalsArr.forEach((v, i) => { if (v < min) { min = v; idx = i; } });
      return { type: 'player', idx };
    }
  }

  // Top-level render — picks the right per-screen renderer based on currentScreen,
  // also auto-navigates to the winner screen the moment the game ends.
  function render() {
    const totalsArr = totals();
    const dealer = dealerIndex(totalsArr);
    const winner = checkWinner(totalsArr);
    state.gameOver = winner !== null;

    // Auto-navigate to winner screen on first detection of a finished game
    if (winner !== null && !state.gameLogged && state.players.length > 0) {
      logFinishedGame(winner, totalsArr);
      save();
      closeSheet();
      navigate('winner');
      return;
    }

    if (state.currentScreen === 'home')    renderHome();
    if (state.currentScreen === 'play')    renderPlay(totalsArr, dealer, winner);
    if (state.currentScreen === 'history') renderHistory();
    if (state.currentScreen === 'winner')  renderWinner(totalsArr, winner);

    // Sheet renders independently of currentScreen
    if (!document.getElementById('sheet').classList.contains('hidden')) {
      renderSheet();
    }
  }

  // ===== Play screen — standings tiles + threshold info + round number =====
  function renderPlay(totalsArr, dealer, winner) {
    // Team summary (Sebeeta only — top scorer per team)
    const teamSummary = document.getElementById('teamSummary');
    if (state.gameMode === 'sebeeta') {
      teamSummary.innerHTML = [0, 1].map(ti => {
        let topIdx = -1, topScore = -Infinity;
        state.playerTeam.forEach((tIdx, pIdx) => {
          if (tIdx === ti && totalsArr[pIdx] > topScore) {
            topScore = totalsArr[pIdx];
            topIdx = pIdx;
          }
        });
        const topName = topIdx >= 0 ? state.players[topIdx] : '—';
        const score = topIdx >= 0 ? totalsArr[topIdx] : 0;
        return `<div class="team-summary-card">
          <div class="label">${escapeHtml(teamName(ti))} · ${escapeHtml(topName)}</div>
          <div class="value">${score}</div>
        </div>`;
      }).join('');
      teamSummary.classList.remove('hidden');
    } else {
      teamSummary.classList.add('hidden');
      teamSummary.innerHTML = '';
    }

    // Standings tiles
    const standings = document.getElementById('standingsContainer');
    standings.innerHTML = '';
    if (state.gameMode === 'kout') {
      const stack = document.createElement('div');
      stack.className = 'team-stack';
      [0, 1].forEach(ti => {
        const total = totalsArr[ti];
        const pct = Math.min(100, (total / state.threshold) * 100);
        const isWinner = winner && winner.type === 'team' && winner.idx === ti;
        const members = state.players.filter((_, pi) => state.playerTeam[pi] === ti).join(' · ');
        const tile = document.createElement('div');
        tile.className = 'team-tile' + (isWinner ? ' leader' : '');
        tile.innerHTML = `
          <div class="team-row">
            <div>
              <div class="team-name">${escapeHtml(teamName(ti))}${isWinner ? `<span class="winner-badge">${escapeHtml(t('winnerBadge'))}</span>` : ''}</div>
              <div class="members">${escapeHtml(members)}</div>
            </div>
          </div>
          <div class="team-score">${total}</div>
          <div class="team-bar"><div style="width:${pct}%"></div></div>`;
        stack.appendChild(tile);
      });
      standings.appendChild(stack);
    } else {
      const grid = document.createElement('div');
      grid.className = 'player-grid';
      state.players.forEach((name, i) => {
        const total = totalsArr[i];
        const isDealer = i === dealer && total > 0;
        const isWinnerTile = winner && winner.type === 'player' && winner.idx === i;
        const pct = Math.min(100, (Math.abs(total) / state.threshold) * 100);
        const teamChip = isTeamMode()
          ? `<span class="team-chip">${escapeHtml(state.playerTeam[i] === 0 ? t('teamA') : t('teamB'))}</span>`
          : '';
        const dealerBadge = isDealer ? `<span class="dealer-badge">${escapeHtml(t('dealerBadge'))}</span>` : '';
        const winnerBadge = isWinnerTile ? `<span class="winner-badge">${escapeHtml(t('winnerBadge'))}</span>` : '';
        const tile = document.createElement('div');
        tile.className = 'player-tile' + (isWinnerTile || isDealer ? ' leader' : '');
        tile.innerHTML = `
          <div class="pt-head">
            <div class="pt-name">${escapeHtml(name)}${teamChip}${dealerBadge}${winnerBadge}</div>
            <span class="pt-seat">${i + 1}</span>
          </div>
          <div>
            <div class="pt-score">${total}</div>
            <div class="pt-bar"><div style="width:${pct}%"></div></div>
          </div>`;
        grid.appendChild(tile);
      });
      standings.appendChild(grid);
    }

    // Threshold caption
    let infoText;
    if (state.gameMode === 'sebeeta') infoText = t('sebeetaHint');
    else if (state.gameMode === 'kout') infoText = t('koutHint');
    else infoText = state.winRule === 'highest' ? t('infoHighest')(state.threshold) : t('infoLowest')(state.threshold);
    document.getElementById('thresholdInfo').textContent = infoText;

    // Round number in toolbar + action button
    const nextRound = state.scores.length + 1;
    document.getElementById('playRoundNum').textContent = nextRound;
    document.getElementById('recordRoundNum').textContent = nextRound;

    // Disable record/undo as appropriate
    const recordBtn = document.querySelector('#screen-play .record-btn');
    if (recordBtn) recordBtn.disabled = state.gameOver;
    const undoBtn = document.querySelector('#screen-play .undo-btn');
    if (undoBtn) undoBtn.disabled = state.scores.length === 0;
  }

  // ===== Round-entry sheet =====
  function renderSheet() {
    document.getElementById('sheetRoundNum').textContent = state.scores.length + 1;
    const rin = document.getElementById('roundInputs');
    rin.innerHTML = '';

    if (state.gameMode === 'kout') {
      renderKoutSheet(rin);
    } else {
      renderPlayerSheet(rin);
    }
  }

  function renderKoutSheet(rin) {
    const mode = state.koutEntryMode || 'contract';
    const toggle = document.createElement('div');
    toggle.className = 'entry-mode-toggle';
    toggle.innerHTML = `
      <button type="button" class="${mode === 'contract' ? 'active' : ''}" onclick="setKoutEntryMode('contract')">${escapeHtml(t('contractMode'))}</button>
      <button type="button" class="${mode === 'manual' ? 'active' : ''}" onclick="setKoutEntryMode('manual')">${escapeHtml(t('manualMode'))}</button>
    `;
    rin.appendChild(toggle);

    if (mode === 'contract') {
      const callerSec = document.createElement('div');
      callerSec.className = 'contract-section';
      callerSec.innerHTML = `<div class="label">${escapeHtml(t('callerLabel'))}</div>`;
      const callerChips = document.createElement('div');
      callerChips.className = 'contract-chips';
      [0, 1].forEach(c => {
        const b = document.createElement('button');
        b.type = 'button';
        b.className = 'chip' + (koutContract.caller === c ? ' active' : '');
        b.textContent = teamName(c);
        b.onclick = () => setContractCaller(c);
        callerChips.appendChild(b);
      });
      callerSec.appendChild(callerChips);
      rin.appendChild(callerSec);

      const levelSec = document.createElement('div');
      levelSec.className = 'contract-section';
      levelSec.innerHTML = `<div class="label">${escapeHtml(t('levelLabel'))}</div>`;
      const levelChips = document.createElement('div');
      levelChips.className = 'contract-chips';
      KOUT_LEVELS.forEach(lv => {
        const b = document.createElement('button');
        b.type = 'button';
        b.className = 'chip' + (koutContract.level === lv ? ' active' : '');
        b.textContent = koutLevelLabel(lv);
        b.onclick = () => setContractLevel(lv);
        levelChips.appendChild(b);
      });
      levelSec.appendChild(levelChips);
      rin.appendChild(levelSec);

      const outSec = document.createElement('div');
      outSec.className = 'contract-section';
      outSec.innerHTML = `<div class="label">${escapeHtml(t('outcomeLabel'))}</div>`;
      const outChips = document.createElement('div');
      outChips.className = 'contract-chips';
      [
        { key: 'made', label: t('outcomeMade'), cls: 'outcome-win' },
        { key: 'failed', label: t('outcomeFailed'), cls: 'outcome-fail' }
      ].forEach(o => {
        const b = document.createElement('button');
        b.type = 'button';
        b.className = `chip ${o.cls}` + (koutContract.outcome === o.key ? ' active' : '');
        b.textContent = o.label;
        b.onclick = () => setContractOutcome(o.key);
        outChips.appendChild(b);
      });
      outSec.appendChild(outChips);
      rin.appendChild(outSec);

      if (koutContract.caller !== null && koutContract.level && koutContract.outcome) {
        const [aScore, bScore] = computeContractScore(koutContract.caller, koutContract.level, koutContract.outcome);
        const preview = document.createElement('div');
        preview.className = 'contract-preview';
        preview.innerHTML = `
          <div class="team-result ${aScore > 0 ? 'win' : ''}">
            <div class="label">${escapeHtml(teamName(0))}</div>
            <div class="value">+${aScore}</div>
          </div>
          <div class="vs">vs</div>
          <div class="team-result ${bScore > 0 ? 'win' : ''}">
            <div class="label">${escapeHtml(teamName(1))}</div>
            <div class="value">+${bScore}</div>
          </div>`;
        rin.appendChild(preview);
      } else {
        const hint = document.createElement('div');
        hint.className = 'contract-hint';
        hint.textContent = t('contractHint');
        rin.appendChild(hint);
      }
    } else {
      // MANUAL — two entry rows
      [0, 1].forEach((ti, i) => {
        const row = document.createElement('div');
        row.className = 'entry-row';
        const seat = document.createElement('div');
        seat.className = 'seat';
        seat.textContent = ti === 0 ? 'A' : 'B';
        row.appendChild(seat);
        const who = document.createElement('div');
        who.className = 'who';
        const members = state.players.filter((_, pi) => state.playerTeam[pi] === ti).join(' · ');
        who.innerHTML = `${escapeHtml(teamName(ti))}<span class="members">${escapeHtml(members)}</span>`;
        row.appendChild(who);
        const input = document.createElement('input');
        input.type = 'number';
        input.inputMode = 'numeric';
        input.id = 'roundScore' + i;
        input.value = '0';
        input.addEventListener('focus', () => input.select());
        input.addEventListener('keydown', (e) => {
          if (e.key !== 'Enter') return;
          e.preventDefault();
          if (i < 1) document.getElementById('roundScore1')?.focus();
          else submitRound();
        });
        row.appendChild(input);
        rin.appendChild(row);
      });
    }
  }

  function renderPlayerSheet(rin) {
    // Sebeeta + Custom: per-player entries, with optional numpad style
    const style = state.entryStyle || 'numpad';

    const styleToggle = document.createElement('div');
    styleToggle.className = 'entry-style-toggle';
    styleToggle.innerHTML = `
      <button type="button" class="${style === 'numpad' ? 'active' : ''}" onclick="setEntryStyle('numpad')">${escapeHtml(t('entryStyleNumpad'))}</button>
      <button type="button" class="${style === 'pm' ? 'active' : ''}" onclick="setEntryStyle('pm')">${escapeHtml(t('entryStylePlusMinus'))}</button>
    `;
    rin.appendChild(styleToggle);

    if (style === 'numpad') {
      renderNumpadEntry(rin);
    } else {
      renderPlayerRowsEntry(rin);
    }
  }

  function renderPlayerRowsEntry(rin) {
    const entries = state.players.map((name, i) => ({ name, seat: (i + 1).toString() }));
    const n = entries.length;
    entries.forEach((ent, i) => {
      const row = document.createElement('div');
      row.className = 'entry-row';
      const seat = document.createElement('div');
      seat.className = 'seat';
      seat.textContent = ent.seat;
      row.appendChild(seat);
      const who = document.createElement('div');
      who.className = 'who';
      who.textContent = ent.name;
      row.appendChild(who);
      const input = document.createElement('input');
      input.type = 'number';
      input.inputMode = 'numeric';
      input.id = 'roundScore' + i;
      input.value = '0';
      input.addEventListener('focus', () => input.select());
      input.addEventListener('input', () => {
        const btn = document.getElementById('minusBtn' + i);
        if (btn && parseInt(input.value) !== -10) btn.classList.remove('active');
      });
      input.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter') return;
        e.preventDefault();
        if (i < n - 1) document.getElementById('roundScore' + (i + 1))?.focus();
        else submitRound();
      });
      row.appendChild(input);
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.id = 'minusBtn' + i;
      btn.className = 'minus-btn';
      btn.textContent = '−10';
      btn.onclick = () => toggleMinus(i);
      row.appendChild(btn);
      rin.appendChild(row);
    });
  }

  // Numpad entry: one player at a time, with a 3x4 keypad
  let numpadActive = 0;        // which player is currently being entered
  let numpadBuffer = '0';      // current input value as a string ('-' allowed at front)
  let numpadValues = [];       // committed values per player for this round
  function renderNumpadEntry(rin) {
    // Initialize numpad state if not already
    if (numpadValues.length !== state.players.length) {
      numpadValues = state.players.map(() => 0);
      numpadActive = 0;
      numpadBuffer = '0';
    }

    const sec = document.createElement('div');
    sec.className = 'numpad-section';

    // Current player context
    const ctx = document.createElement('div');
    ctx.className = 'numpad-context';
    ctx.innerHTML = `
      <div class="seat">${numpadActive + 1}</div>
      <div class="who">${escapeHtml(state.players[numpadActive] || '')}</div>
      <div style="font-family:var(--font-num); font-size:12px; color:var(--muted);">
        ${numpadActive + 1} / ${state.players.length}
      </div>
    `;
    sec.appendChild(ctx);

    const display = document.createElement('div');
    display.className = 'numpad-display';
    display.textContent = numpadBuffer;
    sec.appendChild(display);

    const grid = document.createElement('div');
    grid.className = 'numpad-grid';
    // Row 1-3: digits, Row 4: sign, 0, backspace; bottom row: prev/next/penalty
    const keys = [
      ['1','2','3'],
      ['4','5','6'],
      ['7','8','9'],
      ['±','0','⌫']
    ];
    keys.flat().forEach(k => {
      const b = document.createElement('button');
      b.type = 'button';
      b.textContent = k;
      if (k === '±') b.className = 'np-sign';
      if (k === '⌫') b.className = 'np-sign';
      b.onclick = () => numpadKey(k);
      grid.appendChild(b);
    });
    sec.appendChild(grid);

    // Footer row: prev / -10 penalty / next-or-save
    const footer = document.createElement('div');
    footer.className = 'numpad-grid numpad-nav';
    footer.style.marginTop = '6px';
    const isLast = numpadActive === state.players.length - 1;

    const prev = document.createElement('button');
    prev.type = 'button';
    prev.className = 'np-sign';
    prev.innerHTML = `<span class="np-arrow">‹</span><span class="np-label">${escapeHtml(t('prevPlayer'))}</span>`;
    prev.disabled = numpadActive === 0;
    prev.onclick = () => numpadNav(-1);
    footer.appendChild(prev);

    const pen = document.createElement('button');
    pen.type = 'button';
    pen.className = 'np-pen';
    pen.textContent = '−10';
    pen.onclick = () => { numpadBuffer = '-10'; renderSheet(); };
    footer.appendChild(pen);

    const next = document.createElement('button');
    next.type = 'button';
    next.className = 'np-action';
    if (isLast) {
      next.textContent = t('saveBtn');
    } else {
      next.innerHTML = `<span class="np-label">${escapeHtml(t('nextPlayer'))}</span><span class="np-arrow">›</span>`;
    }
    next.onclick = () => numpadNav(+1);
    footer.appendChild(next);

    sec.appendChild(footer);
    rin.appendChild(sec);
  }

  function numpadKey(k) {
    if (k === '⌫') {
      numpadBuffer = numpadBuffer.length > 1 ? numpadBuffer.slice(0, -1) : '0';
      if (numpadBuffer === '-') numpadBuffer = '0';
    } else if (k === '±') {
      if (numpadBuffer === '0') numpadBuffer = '-';
      else if (numpadBuffer.startsWith('-')) numpadBuffer = numpadBuffer.slice(1);
      else numpadBuffer = '-' + numpadBuffer;
    } else {
      // digit
      if (numpadBuffer === '0') numpadBuffer = k;
      else if (numpadBuffer === '-') numpadBuffer = '-' + k;
      else numpadBuffer = numpadBuffer + k;
    }
    renderSheet();
  }

  function numpadNav(dir) {
    // Commit current value
    const v = parseInt(numpadBuffer, 10);
    numpadValues[numpadActive] = isNaN(v) ? 0 : v;
    const next = numpadActive + dir;
    if (next < 0) return;
    if (next >= state.players.length) {
      // Submit
      state.scores.push(numpadValues.slice());
      numpadValues = state.players.map(() => 0);
      numpadActive = 0;
      numpadBuffer = '0';
      closeSheet();
      save();
      render();
      return;
    }
    numpadActive = next;
    numpadBuffer = String(numpadValues[numpadActive] ?? 0);
    renderSheet();
  }

  function setEntryStyle(style) {
    state.entryStyle = style;
    save();
    renderSheet();
  }

  // ===== History screen =====
  function renderHistory() {
    const head = document.getElementById('historyHead');
    const colHeaders = state.gameMode === 'kout'
      ? [0, 1].map(ti => ({ name: teamName(ti) }))
      : state.players.map((name) => ({ name }));
    head.innerHTML = `<th>${escapeHtml(t('thRound'))}</th>` +
      colHeaders.map(c => `<th>${escapeHtml(c.name)}</th>`).join('') +
      (state.gameMode === 'kout' ? '' : `<th>${escapeHtml(t('thDealerAfter'))}</th>`) +
      `<th>${escapeHtml(t('thActions'))}</th>`;
    const hbody = document.getElementById('historyBody');
    hbody.innerHTML = '';
    const colCount = colHeaders.length;
    let runningTotals = new Array(colCount).fill(0);
    state.scores.forEach((round, ri) => {
      runningTotals = runningTotals.map((v, i) => v + (round[i] || 0));
      const dIdx = dealerIndex(runningTotals);
      const tr = document.createElement('tr');
      if (editingRound === ri) {
        const lastIdx = colCount - 1;
        const inputs = [];
        for (let i = 0; i < colCount; i++) {
          inputs.push(`<td><input type="number" inputmode="numeric" id="editScore_${ri}_${i}" value="${round[i] || 0}" onfocus="this.select()" onkeydown="handleEditKey(event, ${ri}, ${i}, ${lastIdx})" /></td>`);
        }
        tr.innerHTML = `<td><strong>${ri+1}</strong></td>` +
          inputs.join('') +
          (state.gameMode === 'kout' ? '' : `<td>—</td>`) +
          `<td>
            <button onclick="saveEditedRound(${ri})">${escapeHtml(t('saveBtn'))}</button>
            <button class="secondary" onclick="cancelEditRound()" style="margin-inline-start:4px;">${escapeHtml(t('cancelBtn'))}</button>
          </td>`;
      } else {
        const cells = [];
        for (let i = 0; i < colCount; i++) {
          cells.push(`<td><span class="num">${round[i] || 0}</span><span class="running">${runningTotals[i]}</span></td>`);
        }
        const dealerCell = state.gameMode === 'kout' ? '' : `<td>${dIdx >= 0 ? escapeHtml(state.players[dIdx]) : '—'}</td>`;
        tr.innerHTML = `<td><strong>${ri+1}</strong></td>` +
          cells.join('') +
          dealerCell +
          `<td>
            <button class="secondary" onclick="startEditRound(${ri})">${escapeHtml(t('editBtn'))}</button>
            <button class="danger" onclick="deleteRound(${ri})" style="margin-inline-start:4px;">${escapeHtml(t('deleteBtn'))}</button>
          </td>`;
      }
      hbody.appendChild(tr);
    });
  }

  // ===== Winner screen =====
  function renderWinner(totalsArr, winner) {
    if (!winner) return;
    let name, score;
    if (winner.type === 'player') {
      name = state.players[winner.idx];
      score = totalsArr[winner.idx];
    } else {
      name = teamName(winner.idx);
      score = state.gameMode === 'kout'
        ? `${totalsArr[winner.idx]}–${totalsArr[1 - winner.idx]}`
        : '';
    }
    document.getElementById('winnerName').textContent = name;
    document.getElementById('winnerScore').textContent = String(score);
    const meta = `${t('roundsPlayed')(state.scores.length)}`;
    document.getElementById('winnerMeta').textContent = meta;
  }

  function submitRound() {
    let round;
    if (state.gameMode === 'kout' && state.koutEntryMode === 'contract') {
      // Validate contract is complete
      if (koutContract.caller === null || !koutContract.level || !koutContract.outcome) {
        alert(t('contractHint'));
        return;
      }
      round = computeContractScore(koutContract.caller, koutContract.level, koutContract.outcome);
      resetContract();
    } else {
      const n = state.gameMode === 'kout' ? 2 : state.players.length;
      round = [];
      for (let i = 0; i < n; i++) {
        const v = parseInt(document.getElementById('roundScore' + i).value);
        round.push(isNaN(v) ? 0 : v);
      }
    }
    state.scores.push(round);
    closeSheet();
    save();
    render();
  }

  function toggleMinus(i) {
    const input = document.getElementById('roundScore' + i);
    const btn = document.getElementById('minusBtn' + i);
    if (!input || !btn) return;
    if (btn.classList.contains('active')) {
      btn.classList.remove('active');
      input.value = '0';
    } else {
      btn.classList.add('active');
      input.value = '-10';
    }
  }

  function startEditRound(ri) {
    editingRound = ri;
    render();
    // Focus first edit input after render
    setTimeout(() => {
      const f = document.getElementById(`editScore_${ri}_0`);
      if (f) f.focus();
    }, 0);
  }

  function handleEditKey(ev, ri, i, lastIdx) {
    if (ev.key !== 'Enter') return;
    ev.preventDefault();
    if (i < lastIdx) {
      const next = document.getElementById(`editScore_${ri}_${i + 1}`);
      if (next) next.focus();
    } else {
      saveEditedRound(ri);
    }
  }

  function cancelEditRound() {
    editingRound = null;
    render();
  }

  function saveEditedRound(ri) {
    const n = state.gameMode === 'kout' ? 2 : state.players.length;
    const updated = [];
    for (let i = 0; i < n; i++) {
      const v = parseInt(document.getElementById(`editScore_${ri}_${i}`).value);
      updated.push(isNaN(v) ? 0 : v);
    }
    state.scores[ri] = updated;
    editingRound = null;
    save();
    render();
  }

  function deleteRound(ri) {
    if (!confirm(t('confirmDelete')(ri + 1))) return;
    state.scores.splice(ri, 1);
    if (editingRound === ri) editingRound = null;
    else if (editingRound !== null && editingRound > ri) editingRound -= 1;
    save();
    render();
  }

  function undoRound() {
    if (state.scores.length === 0) return;
    if (!confirm(t('confirmUndo'))) return;
    state.scores.pop();
    save();
    render();
  }

  function resetGame() {
    if (!confirm(t('confirmReset'))) return;
    // Keep players, threshold, winRule, lang. Just wipe scores & end-of-game state.
    state.scores = [];
    state.gameOver = false;
    state.gameLogged = false;
    editingRound = null;
    resetContract();
    save();
    navigate('play');
  }

  function clearPlayers() {
    if (!confirm(t('confirmClearPlayers'))) return;
    const keepLang = state.lang;
    const keepKoutMode = state.koutEntryMode || 'contract';
    const keepRecents = state.recentGames || [];
    const keepEntryStyle = state.entryStyle || 'pm';
    localStorage.removeItem(STORAGE_KEY);
    state = {
      gameMode: 'sebeeta', players: [], playerTeam: [], teamNames: [], scores: [],
      threshold: 201, winRule: 'lowest', gameOver: false, gameLogged: false,
      lang: keepLang, koutEntryMode: keepKoutMode, entryStyle: keepEntryStyle,
      currentScreen: 'home', recentGames: keepRecents
    };
    editingRound = null;
    resetContract();
    document.getElementById('playerNameSection').classList.add('hidden');
    applyLang();
    navigate('home');
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // Init
  applyTheme();
  applyLang();
  if (!load()) {
    // Fresh session — land on Home screen
    navigate('home');
  }

  // ESC closes the round sheet
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && !document.getElementById('sheet').classList.contains('hidden')) {
      closeSheet();
    }
  });
</script>
</body>
</html>
